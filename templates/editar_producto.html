{% extends "base.html" %}

{% block title %}Editar Producto{% endblock %}

{% block content %}
<h1><i class="fas fa-edit" style="background: none; -webkit-text-fill-color: #4f46e5; margin-right: 8px;"></i> Editar Producto</h1>

<div class="card">
    <div class="card-title"><i class="fas fa-pencil-alt"></i> {{ producto.nombre }}</div>
    
    <form method="POST">
        <div style="margin-bottom: 16px;">
            <label for="nombre" style="font-weight: 600; display: block; margin-bottom: 6px;">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-control" value="{{ producto.nombre }}" required>
        </div>
        
        <div style="margin-bottom: 16px;">
            <label for="descripcion" style="font-weight: 600; display: block; margin-bottom: 6px;">Descripción</label>
            <input type="text" id="descripcion" name="descripcion" class="form-control" value="{{ producto.descripcion or '' }}">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
            <div>
                <label for="precio" style="font-weight: 600; display: block; margin-bottom: 6px;">Precio venta ($/kg)</label>
                <input type="number" step="0.01" id="precio" name="precio" class="form-control" value="{{ producto.precio_por_kilo }}" required>
            </div>
            <div>
                <label for="stock" style="font-weight: 600; display: block; margin-bottom: 6px;">Stock actual (kg)</label>
                <input type="number" step="0.01" id="stock" name="stock" class="form-control" value="{{ producto.stock_actual }}" required>
            </div>
        </div>
        
        <button type="submit" class="btn btn-success" style="background: rgba(16,185,129,0.2); color:#059669; border-color: rgba(16,185,129,0.3);">
            <i class="fas fa-save"></i> Guardar cambios
        </button>
    </form>
</div>

<a href="{{ url_for('gestion_productos') }}" class="btn btn-secondary" style="margin-top:16px;">
    <i class="fas fa-arrow-left"></i> Volver a productos
</a>

<!-- Reutilizar estilos de formulario -->
<style>
    .form-control {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(0,0,0,0.08);
        background: rgba(255,255,255,0.6);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        font-size: 1rem;
        transition: border 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
    }
    .form-control:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79,70,229,0.15);
    }
    @media (max-width: 480px) {
        .form-control {
            font-size: 0.9rem;
            padding: 10px 12px;
        }
    }
</style>
{% endblock %}
